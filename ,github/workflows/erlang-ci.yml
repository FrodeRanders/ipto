name: Erlang CI

on:
  push:
    paths:
      - 'implementations/erlang/**'
      - 'shared/db/postgresql/**'
      - '.github/workflows/erlang-ci.yml'
  pull_request:
    paths:
      - 'implementations/erlang/**'
      - 'shared/db/postgresql/**'
      - '.github/workflows/erlang-ci.yml'

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          rebar3-version: '3'
      - name: Compile
        working-directory: implementations/erlang
        run: rebar3 compile
      - name: Unit tests (base profile)
        working-directory: implementations/erlang
        run: rebar3 as test eunit
      - name: GraphQL tests
        working-directory: implementations/erlang
        run: |
          rebar3 as graphql get-deps
          rebar3 as graphql,test eunit

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: repo
          POSTGRES_PASSWORD: repo
          POSTGRES_DB: repo
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/neo4jtest
        options: >-
          --health-cmd "cypher-shell -u neo4j -p neo4jtest 'RETURN 1'"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 20
          --health-start-period 30s
        ports:
          - 7474:7474
          - 7687:7687
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          rebar3-version: '3'
      - name: Load PG schema
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          PGPASSWORD=repo psql -h localhost -U repo -d repo \
            -f shared/db/postgresql/schema.sql
          PGPASSWORD=repo psql -h localhost -U repo -d repo \
            -f shared/db/postgresql/procedures.sql
      - name: Run PG integration tests
        working-directory: implementations/erlang
        run: |
          IPTO_PG_INTEGRATION=1 rebar3 as pg,test eunit \
            --module=ipto_pg_integration_tests
      - name: Run Neo4j integration tests
        working-directory: implementations/erlang
        env:
          IPTO_NEO4J_INTEGRATION: 1
          IPTO_NEO4J_PASSWORD: neo4jtest
        run: |
          rebar3 as test eunit \
            --module=ipto_neo4j_integration_tests
