name: Rust CI

on:
  push:
    paths:
      - 'implementations/rust/**'
      - 'shared/db/postgresql/**'
      - '.github/workflows/rust-ci.yml'
  pull_request:
    paths:
      - 'implementations/rust/**'
      - 'shared/db/postgresql/**'
      - '.github/workflows/rust-ci.yml'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Compile check
        working-directory: implementations/rust
        run: cargo check
      - name: Lint (report only, non-blocking)
        working-directory: implementations/rust
        run: cargo clippy

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Unit tests
        working-directory: implementations/rust
        run: cargo test --lib

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: repo
          POSTGRES_PASSWORD: repo
          POSTGRES_DB: repo
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/neo4jtest
        options: >-
          --health-cmd "cypher-shell -u neo4j -p neo4jtest 'RETURN 1'"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 20
          --health-start-period 30s
        ports:
          - 7474:7474
          - 7687:7687
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Load PG schema
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          PGPASSWORD=repo psql -h localhost -U repo -d repo \
            -f shared/db/postgresql/schema.sql
          PGPASSWORD=repo psql -h localhost -U repo -d repo \
            -f shared/db/postgresql/procedures.sql
      - name: Run integration tests
        working-directory: implementations/rust
        env:
          IPTO_PG_INTEGRATION: 1
          IPTO_NEO4J_INTEGRATION: 1
          IPTO_NEO4J_PASSWORD: neo4jtest
        run: cargo test --test postgres_integration --test neo4j_integration -- --nocapture
