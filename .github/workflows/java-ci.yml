name: Java CI

on:
  push:
    paths:
      - 'implementations/java/**'
      - 'shared/db/postgresql/**'
      - '.github/workflows/java-ci.yml'
  pull_request:
    paths:
      - 'implementations/java/**'
      - 'shared/db/postgresql/**'
      - '.github/workflows/java-ci.yml'

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Build & install vopn (3.0-SNAPSHOT)
        run: |
          git clone --depth 1 https://github.com/FrodeRanders/java-vopn.git "$RUNNER_TEMP/java-vopn"
          mvn -q -DskipTests -f "$RUNNER_TEMP/java-vopn/pom.xml" install
      - name: Build & install modules (skip tests)
        working-directory: implementations/java
        run: mvn -q -DskipTests -pl graphql -am install
      - name: Unit tests (repo)
        working-directory: implementations/java
        run: mvn -q -pl repo test
      - name: Unit tests (graphql)
        working-directory: implementations/java
        run: mvn -q -pl graphql test

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: repo
          POSTGRES_PASSWORD: repo
          POSTGRES_DB: repo
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Build & install vopn (3.0-SNAPSHOT)
        run: |
          git clone --depth 1 https://github.com/FrodeRanders/java-vopn.git "$RUNNER_TEMP/java-vopn"
          mvn -q -DskipTests -f "$RUNNER_TEMP/java-vopn/pom.xml" install
      - name: Load PG schema & seed data
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          PGPASSWORD=repo psql -v ON_ERROR_STOP=1 -h localhost -U repo -d repo \
            -f shared/db/postgresql/schema.sql
          PGPASSWORD=repo psql -v ON_ERROR_STOP=1 -h localhost -U repo -d repo \
            -f shared/db/postgresql/procedures.sql
          PGPASSWORD=repo psql -v ON_ERROR_STOP=1 -h localhost -U repo -d repo \
            -f shared/db/postgresql/boot.sql
      - name: Build & install modules (skip tests)
        working-directory: implementations/java
        run: mvn -q -DskipTests -pl it -am install
      - name: Integration tests
        working-directory: implementations/java
        run: mvn -q -pl it verify
